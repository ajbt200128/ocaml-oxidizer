name: release

# Auto-release when a version bump lands on main. Fires after CI succeeds (so the
# binaries to attach already exist), and only when Cargo.toml's version changed.
# Dogfoods the action: installs `ox` from the latest release, then runs the OCaml
# release script with it.
on:
  workflow_run:
    workflows: [ci]
    types: [completed]

jobs:
  release:
    if: >-
      github.event.workflow_run.conclusion == 'success'
      && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0 # need history + tags for git show / rev-parse / ls-remote
      - name: Release only when the version changed
        id: guard
        run: |
          sha="${{ github.event.workflow_run.head_sha }}"
          version_of() { git show "$1:Cargo.toml" 2>/dev/null | grep -m1 '^version = ' | cut -d'"' -f2; }
          cur=$(version_of "$sha")
          prev=$(version_of "$sha^")
          if [ "$cur" = "$prev" ]; then
            echo "version unchanged ($cur) — nothing to release"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "version $prev -> $cur — releasing"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: ./ # dogfood: install `ox` from the latest release
        if: steps.guard.outputs.changed == 'true'
      - name: Tag and publish the release
        if: steps.guard.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: ox scripts/release.ml "${{ github.event.workflow_run.head_sha }}"
